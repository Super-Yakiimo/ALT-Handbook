<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./map.css">
    <link rel="icon" type="image/x-icon" href="../../resource/img/icon/favicon.ico">
</head>

<body>
    <div class="mode-select">
        <div class="mode-select-inner">
            <h2>Game Mode Select</h2>
            <select name="mapSelect" id="mapSelect">
                <option value="school">school</option>
                <option value="town">town</option>
            </select>
            <select name="modeSelect" id="modeSelect">
                <option value="free">free mode</option>
                <option value="quiz">quiz mode</option>
            </select>
            <button onclick="start()">Enter</button>
        </div>
    </div>
    <div class="root">
        <div class="game">
            <div class="canCon">
                <canvas id="map"></canvas>
                <canvas id="char"></canvas>
            </div>
        </div>
        <div class="control">
            <div>
                <p>X: <span id="xText"></span> Y: <span id="yText"></span></p>
                <h4>Name: <span id="nameText"></span></h4>
                <button id="locSound">Sound</button>
            </div>
            <div>
                <h2>Quiz time</h2>
                <p>Where is the <span id="goalText">###</span>?</p>
                <button disabled id="questSound">Sound</button>
            </div>
            <div class="btn-ctrl">
                <button id="left"><img src="../../resource/img/icon/left.png" alt=""></button>
                <button id="straight"><img src="../../resource/img/icon/up.png" alt=""></button>
                <button id="right"><img src="../../resource/img/icon/right.png" alt=""></button>
            </div>
        </div>
    </div>

    <img id="charImg" class="hide" src="./character.png" alt="">

    <script src="../../database/database.js"></script>
    <script src="./board.js"></script>
    <script src="./map.js"></script>


</body>

</html>
