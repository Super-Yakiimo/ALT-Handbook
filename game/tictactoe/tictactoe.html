<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="./tictactoe.css">
    <link rel="icon" type="image/x-icon" href="../../resource/img/icon/favicon.ico">
</head>

<body>



    <div id="questScrn" class="control hide">
        <div class="control-inner">
            <div style="height: 80%;">
                <h2 id="questText">Quest Text</h2>
                <div id="btnCon"></div>
            </div>
            <div>
                <button id="clsBtn">Close</button>
            </div>
        </div>
    </div>



    <div id="game-root">
        <div id="play-root">
            <div class="row">
                <button id="block0" class="block"></button>
                <button id="block1" class="block"></button>
                <button id="block2" class="block"></button>
            </div>
            <div class="row">
                <button id="block3" class="block"></button>
                <button id="block4" class="block"></button>
                <button id="block5" class="block"></button>
            </div>
            <div class="row">
                <button id="block6" class="block"></button>
                <button id="block7" class="block"></button>
                <button id="block8" class="block"></button>
            </div>
        </div>
        <div id="ui-root">
            <h2>Current turn</h2>
            <img id="uiImg" src="../../resource/img/icon/mark_batsu.png" alt="">
        </div>

    </div>


    <script src="./tictactoe.js"></script>
</body>

</html>
