<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karuta</title>
    <link rel="stylesheet" href="./karuta.css">
    <link rel="icon" type="image/x-icon" href="../../resource/img/icon/favicon.ico">
</head>
<body>
    <div class="control">
        <div class="control-inner">
            <h3>Pick vocab</h3> 

            <div id="checkCon"></div>   

            <h3>Difficulty</h3>
            <select name="level" id="level">
                <option value="3">Easy</option>
                <option value="4">Meduim</option>
                <option value="5">Hard</option>
                <option value="6">Extreme</option>
            </select>

            <div>
                <button onclick="start()">Start</button>               
            </div>

        </div>
    </div>

    <div class="game-root">
        <div class="text-root">
            <h3 id="findText">Find the "<span id="replaceText">###</span>" card</h3>
        </div>
        <div class="card-root"></div>
    </div>

    <script src="../../database/database.js"></script>
    <script src="./karuta.js"></script>
</body>
</html>
