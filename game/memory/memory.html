<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory</title>
    <link rel="stylesheet" href="./memory.css">
    <link rel="icon" type="image/x-icon" href="../../resource/img/icon/favicon.ico">
</head>

<body>
    <div id="start" class="control">
        <div class="control-inner">
            <div class="lrbox">
                <div class="left">
                    <h3>Mode</h3>

                    <select name="mode" id="mode">
                        <option value="0">Picture</option>
                        <option value="1">Text</option>
                        <option value="2">Picture and Text</option>
                    </select>

                    <h3>Difficulty</h3>
                    <select name="level" id="level">
                        <option value="0">Easy</option>
                        <option value="1">Meduim</option>
                        <option value="2">Hard</option>
                        <option value="3">Extreme</option>
                    </select>

                    <div>
                        <button onclick="start()">Start</button>
                    </div>
                </div>
                <div class="right">
                    <h3>Pick vocab</h3>
                    <div id="checkCon"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="end" class="control hide">
        <div class="control-inner">
            <h1>Finish</h1>
            <h2>Score: <span id="endScoreText">###</span></h2>
            <h2>Time: <span id="endTimeText">###</span></h2>
            <button onclick="location.reload(true);">Play Again</button>
        </div>
    </div>

    <div class="game-root">
        <div class="text-root">
            <div>Score: <span id="scoreText">####</span></div>
            <div>Time: <span id="timeText">####</span></div>
        </div>
        <div class="card-root"></div>
    </div>

    <script src="../../database/database.js"></script>
    <script src="./memory.js"></script>
</body>

</html>
