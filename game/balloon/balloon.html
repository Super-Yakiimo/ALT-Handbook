<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balloon Pop</title>
    <link rel="stylesheet" href="./balloon.css">
</head>

<body>
    <div id="start" class="control">
        <div class="control-inner">
            <h3>Pick vocab</h3>

            <input id="fruitCheck" type="checkbox">
            <label for="fruitCheck">Fruit</label>

            <input id="vegCheck" type="checkbox">
            <label for="vegCheck">Vegatable</label>

            <input id="jobCheck" type="checkbox">
            <label for="jobCheck">Job</label>

            <input id="animalCheck" type="checkbox">
            <label for="animalCheck">Animal</label>

            <input id="verbCheck" type="checkbox">
            <label for="verbCheck">Verb</label>

            <h3>Difficulty</h3>
            <select name="level" id="level">
                <option value="4">Easy</option>
                <option value="4">Meduim</option>
                <option value="6">Hard</option>
                <option value="8">Extreme</option>
            </select>

            <br>
            <br>

            <div>
                <button onclick="start()">Start</button>
            </div>
        </div>
    </div>

    <div id="end" class="control hide">
        <div class="control-inner">

        </div>
    </div>

    <canvas></canvas>


    <script src="../../database/database.js"></script>
    <script src="./balloon.js"></script>
</body>

</html>
