<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balloon Pop</title>
    <link rel="stylesheet" href="./balloon.css">
    <link rel="icon" type="image/x-icon" href="../../resource/img/icon/favicon.ico">
</head>

<body>
    <div id="start" class="control">
        <div class="control-inner">
            <h3>Pick vocab</h3>

            <div id="checkCon"></div>

            <h3>Difficulty</h3>
            <select name="level" id="level">
                <option value="10">Easy</option>
                <option value="15">Meduim</option>
                <option value="20">Hard</option>
                <option value="30">Extreme</option>
            </select>

            <br>
            <br>

            <div>
                <button onclick="start()">Start</button>
            </div>
        </div>
    </div>

    <div id="end" class="control hide">
        <div class="control-inner">

        </div>
    </div>

    <canvas></canvas>


    <script src="../../database/database.js"></script>
    <script src="./balloon.js"></script>
</body>

</html>
