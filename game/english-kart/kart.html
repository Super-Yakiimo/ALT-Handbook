<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Kart</title>
    <link rel="stylesheet" href="./kart.css">
    <link rel="icon" type="image/x-icon" href="../../resource/img/icon/favicon.ico">
</head>

<body>

    <!-- start screen select eiekn level -->

    <div id="startBox" class="hide-box hide">
        <div class="hide-box-inner">
            <img id="titleImg" src="./res/img/text/title.png" alt="">
            <button id="startBtn"></button>
        </div>
    </div>

    <!-- chose difficulty box -->

    <div id="levelBox" class="hide-box hide">
        <div class="hide-box-inner">
            <div id="diffText">
                <img src="./res/img/text/Select-Difficulty-5-2-2026.png" alt="">
            </div>
            <div id="numberSelectBox">
                <input class="selectRadio" type="radio" id="level5" name="teamNumb">
                <label onclick="playPop()" class="selectLabel" for="level5">
                    <img src="./res/img/number/five.png" alt="2">
                </label>

                <input class="selectRadio" type="radio" id="level4" name="teamNumb">
                <label onclick="playPop()" class="selectLabel" for="level4">
                    <img src="./res/img/number/four.png" alt="3">
                </label>

                <input class="selectRadio" type="radio" id="level3" name="teamNumb">
                <label onclick="playPop()" class="selectLabel" for="level3">
                    <img src="./res/img/number/three.png" alt="4">
                </label>

                <input class="selectRadio" type="radio" id="levelp2" name="teamNumb">
                <label onclick="playPop()" class="selectLabel" for="levelp2">
                    <img src="./res/img/text/p2.png" alt="5">
                </label>

                <input class="selectRadio" type="radio" id="levelp2p" name="teamNumb">
                <label onclick="playPop()" class="selectLabel" for="levelp2p">
                    <img src="./res/img/text/p2p.png" alt="5">
                </label>

                <input class="selectRadio" type="radio" id="level2" name="teamNumb">
                <label onclick="playPop()" class="selectLabel" for="level2">
                    <img src="./res/img/number/two.png" alt="5">
                </label>
            </div>
            <button id="nmbrEntrBtn"><img src="./res/img/text/enter.png" alt=""></button>
        </div>
    </div>

    <!-- 
        select number of players screen screen
    -->
    <div id="numberBox" class="hide-box hide">
        <div class="hide-box-inner">
            <img id="howManyText" src="./res/img/text/how-many-teams.png" alt="how many teams">
            <div id="numberSelectBox">
                <input class="selectRadio" type="radio" id="teamNumb2" name="teamNumb">
                <label onclick="playPop()" class="selectLabel" for="teamNumb2">
                    <img src="./res/img/number/two.png" alt="2">
                </label>

                <input class="selectRadio" type="radio" id="teamNumb3" name="teamNumb">
                <label onclick="playPop()" class="selectLabel" for="teamNumb3">
                    <img src="./res/img/number/three.png" alt="3">
                </label>

                <input class="selectRadio" type="radio" id="teamNumb4" name="teamNumb">
                <label onclick="playPop()" class="selectLabel" for="teamNumb4">
                    <img src="./res/img/number/four.png" alt="4">
                </label>

                <input class="selectRadio" type="radio" id="teamNumb5" name="teamNumb">
                <label onclick="playPop()" class="selectLabel" for="teamNumb5">
                    <img src="./res/img/number/five.png" alt="5">
                </label>
            </div>
            <button id="nmbrEntrBtn"><img src="./res/img/text/enter.png" alt=""></button>
        </div>
    </div>

    <!-- 
        select characters screen
    -->
    <div id="charBox" class="hide-box hide">
        <div class="hide-box-inner">
            <div id="textBox">
                <img src="./res/img/text/team.png" alt="team">
                <img id="selectIndexNumber" src="./res/img/number/one.png" alt="number">
                <img src="./res/img/text/select-character.png" alt="pick a character">
            </div>
            <div id="charCon">
                <div>
                    <input name="char-select" type="radio" id="boo" class="char-check">
                    <label onclick="playPop()" class="char-check-label" for="boo"><img
                            src="./res/img/character/boo.png"></label>
                    <input name="char-select" type="radio" id="bowser" class="char-check">
                    <label onclick="playPop()" class="char-check-label" for="bowser"><img
                            src="./res/img/character/bowser.png"></label>
                    <input name="char-select" type="radio" id="coupa" class="char-check">
                    <label onclick="playPop()" class="char-check-label" for="coupa"><img
                            src="./res/img/character/coupa.png"></label>
                    <input name="char-select" type="radio" id="curby" class="char-check">
                    <label onclick="playPop()" class="char-check-label" for="curby"><img
                            src="./res/img/character/curby.png"></label>
                    <input name="char-select" type="radio" id="donkey-kong" class="char-check">
                    <label onclick="playPop()" class="char-check-label" for="donkey-kong"><img
                            src="./res/img/character/donkey-kong.png"></label>
                    <input name="char-select" type="radio" id="goomba" class="char-check">
                    <label onclick="playPop()" class="char-check-label" for="goomba"><img
                            src="./res/img/character/goomba.png"></label>
                    <input name="char-select" type="radio" id="inkling" class="char-check">
                    <label onclick="playPop()" class="char-check-label" for="inkling"><img
                            src="./res/img/character/inkling.png"></label>
                    <input name="char-select" type="radio" id="link" class="char-check">
                    <label onclick="playPop()" class="char-check-label" for="link"><img
                            src="./res/img/character/link.png"></label>

                </div>
                <div>
                    <input name="char-select" type="radio" id="luigi" class="char-check">
                    <label onclick="playPop()" class="char-check-label" for="luigi"><img
                            src="./res/img/character/luigi.png"></label>
                    <input name="char-select" type="radio" id="mario" class="char-check">
                    <label onclick="playPop()" class="char-check-label" for="mario"><img
                            src="./res/img/character/mario.png"></label>
                    <input name="char-select" type="radio" id="peach" class="char-check">
                    <label onclick="playPop()" class="char-check-label" for="peach"><img
                            src="./res/img/character/peach.png"></label>
                    <input name="char-select" type="radio" id="rosalina" class="char-check">
                    <label onclick="playPop()" class="char-check-label" for="rosalina"><img
                            src="./res/img/character/rosalina.png"></label>
                    <input name="char-select" type="radio" id="toad" class="char-check">
                    <label onclick="playPop()" class="char-check-label" for="toad"><img
                            src="./res/img/character/toad.png"></label>
                    <input name="char-select" type="radio" id="walauigi" class="char-check">
                    <label onclick="playPop()" class="char-check-label" for="walauigi"><img
                            src="./res/img/character/walauigi.png"></label>
                    <input name="char-select" type="radio" id="wario" class="char-check">
                    <label onclick="playPop()" class="char-check-label" for="wario"><img
                            src="./res/img/character/wario.png"></label>
                    <input name="char-select" type="radio" id="yoshi" class="char-check">
                    <label onclick="playPop()" class="char-check-label" for="yoshi"><img
                            src="./res/img/character/yoshi.png"></label>
                </div>
            </div>
            <div id="pickCharBtn">
                <button id="charEntrBtn"><img src="./res/img/text/enter.png" alt=""></button>
            </div>
        </div>
    </div>
    </div>

    <!-- 
        dice screen
    -->

    <div id="diceBox" class="hide-box hide">
        <div class="hide-box-inner">
            <div id="diceTextBox">
                <img src="./res/img/text/team.png" alt="team">
                <img id="diceIndexNumber" src="./res/img/number/one.png" alt="number">
                <img src="./res/img/text/roll-the-dice-5-2-2026.png" alt="pick a character">
            </div>
            <div id="diceResultCon">
                <img id="diceResultImg" src="./res/img/item/dice.png" alt="">
            </div>
            <div id="diceButtons">
                <button id="rollBtn"><img src="./res/img/text/roll.png" alt=""></button>
                <button class="hide" id="rollNextBtn"><img src="./res/img/text/next.png" alt=""></button>
            </div>
        </div>
    </div>

    <!-- 
        question screen
    -->
    <div id="questBox" class="hide-box">
        <div class="hide-box-inner">
            <h3 id="questText"></h3>
            <div id="questBtnCon"></div>
            <button class="hide" id="nextBtn"><img src="./res/img/text/next.png" alt="next"></button>
            <button class="hide" id="itemBtn"><img src="./res/img/text/enter.png" alt="item"></button>
        </div>
    </div>

    <!-- 
        get item
    -->
    <div id="itemBox" class="hide-box hide">
        <div class="hide-box-inner">
            <img src="./res/img/item/lightning.png" alt="">
            <button id="getItemBtn">Get Item</button>
            <button id="nextItemBtn">Next</button>
        </div>
    </div>

    <!-- 
        get item
    -->

    <div id="endBox" class="hide-box hide">
        <div class="hide-box-inner">
            End screen

            <p>First ###</p>
            <p>Second ###</p>
            <p>Third ###</p>
        </div>
    </div>



    <script src="../../database/eiken.js"></script>
    <script src="./kart.js"></script>
</body>

</html>
