<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typhoon</title>
    <link rel="stylesheet" href="./typhoon.css">
</head>

<body>

    <div id="start" class="control">
        <div class="control-inner">
            <div class="lrbox">
                <div class="left">
                    <h3>How many teams</h3>
                    <select name="team" id="team">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                    </select>

                    <h3>How many cards</h3>
                    <select name="size" id="size">
                        <option value="0">Small</option>
                        <option value="1">Meduim</option>
                        <option value="2">Large</option>
                        <option value="3">Giant</option>
                    </select>

                    <br>
                    <br>

                    <div>
                        <button onclick="start()">Start</button>
                    </div>
                </div>
                <div class="right">
                    <h3>Pick vocab</h3>
                    <div id="checkCon"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="endBox" class="control hide">
        <div class="control-inner">
            <div style="width: 90%;height: 90%;">
                <p>If you press this button the game will reset!</p>
                <button onclick="location.reload(true);">Reset</button>
            </div>
            
            <p>Press this button to continue playing the game.</p>
            <button onclick="closeEnd()">Close</button>
        </div>
    </div>

    <div class="root">
        <div class="game">

        </div>
        <div class="game-control">
            <div id="users">

            </div>
            <div id="end">
                <button onclick="openEnd()">Reset</button>
            </div>
        </div>
    </div>

    <script src="../../database/speak.js"></script>
    <script src="../../database/database.js"></script>
    <script src="./typhoon.js"></script>
</body>

</html>
