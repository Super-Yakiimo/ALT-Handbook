<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./whiteBoard.css">
    <link rel="icon" type="image/x-icon" href="../../resource/img/icon/favicon.ico">
</head>

<body>
    <div class="root">
        <div class="game">
            <div class="canCon">
                <canvas id="draw"></canvas>
                <canvas id="tool"></canvas>
            </div>
        </div>
        <div class="control">
            <div>
                <h2>Control</h2>

                <label for="drawBtn">Draw</label>
                <input id="drawBtn" name="mode" type="radio">
                <br>

                <label for="earaseBtn">Earase</label>
                <input id="earaseBtn" name="mode" type="radio">
                <br>

                <label for="stampBtn">Stamp</label>
                <input id="stampBtn" name="mode" type="radio">
                <br>

                <label for="clearBtn">Clear</label>
                <input id="clearBtn" name="mode" type="radio">
                <br>
                
            </div>
            <div>
                <h2>Color</h2>
                <label>Random: </label>
                <input id="randColor" type="checkbox">
                <br>
                <label>Color: </label>
                <input id="color" type="color">
                <br>
                <label>BackColor: </label>
                <input id="backColor" type="color">
                <br>
                <label>Size: </label>
                <input id="size" type="range">
                
            </div>

            <div>
                <h2>Stamp</h2>
                <select name="" id=""></select>
            </div>

            to do
            color picker
            stamp select
            draw size
            draw shape
            samp size
            other
        </div>

    </div>



    <script src="./whiteBoard.js"></script>
</body>

</html>
