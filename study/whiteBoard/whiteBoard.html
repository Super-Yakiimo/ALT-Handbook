<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./whiteBoard.css">
    <link rel="icon" type="image/x-icon" href="../../resource/img/icon/favicon.ico">
</head>

<body>
    <div class="root">
        <div class="game">
            <div class="canCon">
                <canvas id="draw"></canvas>
                <canvas id="tool"></canvas>
            </div>
        </div>
        <div class="control">
            <div id="top">
                <h2>Control</h2>

                <label for="drawBtn">Draw</label>
                <input checked id="drawBtn" name="mode" type="radio">
                <br>

                <label for="earaseBtn">Earase</label>
                <input id="earaseBtn" name="mode" type="radio">
                <br>

                <label for="stampBtn">Stamp</label>
                <input id="stampBtn" name="mode" type="radio">
                <br>

                <button id="clearBtn" name="mode">Clear</button>
                <br>
                
            </div>
            <div id="middle">
                <h2>Color</h2>
                <label>Random: </label>
                <input id="randColor" type="checkbox">
                <br>
                <label>Color: </label>
                <input value="#ffffff" id="color" type="color">
                <br>
                <label>BackColor: </label>
                <input id="backColor" type="color">
                <br>
                <label>Size: </label>
                <input type="range" value="20" id="size" type="range">
                <span id="sizeOut"></span>
                
            </div>

            <div id="bottom">
                <h2>Stamp</h2>
                <label>Stamp size: </label>
                <input type="range" value="100" max="1000" id="stampSize" type="range">
                <span id="stampSizeOut"></span>
                <br>
                <select name="selectType" id="selectType"></select>
                <div name="selectImg" id="selectImg"></div>
            </div>

        </div>

    </div>

    <script src="../../database/database.js"></script>
    <script src="./whiteBoard.js"></script>
</body>

</html>
