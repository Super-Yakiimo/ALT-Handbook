<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Maker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="printArea">

        <table id="table">
        </table>

        <div id="words"></div>


        <table id="puzzle">
        </table>

    </div>

    <script src="../../database/database.js"></script>

    <script src="./script.js"></script>

    <script>

        const WIDTH = 5;
        const HEIGHT = 5;

        const VOWL = "aeiuoAEIOU";

        let food = STATIONARY.splice(0, 10);
        console.log(food);

        let table = document.querySelector("#table");

        let quest = "What's this?";
        let resp = "It's ";

        let words = document.querySelector("#words");

        for (let j = 0; j < 2; j++) {
            let tr = document.createElement('tr');
            for (let i = 0; i < 5; i++) {
                // add row
                let td = document.createElement('td');
                let obj = food[j * 5 + i];
                let path = "../../resource/img/" + obj.link;
                let art = (VOWL.includes(obj.name[0])) ? "an" : "a";
                td.innerHTML = `<img src="${path}"><p>${obj.name}</p>`;
                tr.appendChild(td);

                // add words
                words.innerHTML += `<p>${quest}</p><p>${resp} ${art} ${obj.name}</p>`;

            }
            table.appendChild(tr);
        }

        let comicPath = "./comicteacher.png";
        let puzzle = document.querySelector("#puzzle");

        for (let j = 0; j < 5; j++) {
            let tr = document.createElement('tr');
            for (let i = 0; i < 2; i++) {
                let obj = food[i * WIDTH + j];
                let path = "../../resource/img/" + obj.link;
                let art = (VOWL.includes(obj.name[0])) ? "an" : "a ";

                // add row
                let td = document.createElement('td');
                td.innerHTML = `<img src="${comicPath}"><p class='quest'>${quest}</p><p class='trace'>${resp} ${art} ______.</p><img class="corner" src="${path}">`;

                tr.appendChild(td);

            }
            puzzle.appendChild(tr);
        }

    </script>

</body>

</html>
