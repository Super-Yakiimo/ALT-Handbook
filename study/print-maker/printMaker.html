<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Maker</title>
    <link rel="stylesheet" href="./printMaker.css">
</head>

<body>

    <div id="start" class="control">
        <div class="control-inner">
            <div class="lrbox">
                <div class="left">

                    <div>
                        <label for="quest">Question: </label>
                        <input id="quest" type="text">
                    </div>

                    <div>
                        <label for="answer">Anwer: </label>
                        <input id="answer" type="text">
                    </div>


                    <br>
                    <br>

                    <div>
                        <button onclick="start()">Start</button>
                    </div>
                </div>
                <div class="right">
                    <h3>Pick vocab</h3>

                    <div id="checkCon"></div>
                </div>
            </div>

        </div>
    </div>

    <div id="printArea">

        <table id="table">
        </table>

        <div id="words"></div>


        <table id="puzzle">
        </table>

    </div>

    <script src="../../database/database.js"></script>
    <script src="./printMaker.js"></script>
</body>

</html>
