<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Maker</title>
    <link rel="stylesheet" href="./printMaker.css">
</head>

<body>

    <div class="root">
        <div class="root-inner">

            <h2>Controls</h2>

            <h3>Pick vocab</h3>

            <div id="checkCon"></div>

            <div>
                <label for="quest">Question: </label>
                <input id="quest" type="text" value="What do you like?">
            </div>

            <div>
                <label for="answer">Anwer: </label>
                <input id="answer" type="text" value="I like">
            </div>


            <button onclick="start()">Gen</button>


            <h2>Edit html</h2>

            <textarea name="" id="editBox"></textarea>

            <div>
                <button onclick="edit()">update</button>

                <button onclick='printPreview()'>Print</button>
            </div>


        </div>
        <div class="root-inner">
            <h2>Preview</h2>

            <div id="printArea">

                preview will appear here


            </div>
        </div>
    </div>


    <script src="../../database/database.js"></script>
    <script src="./printMaker.js"></script>
</body>

</html>
