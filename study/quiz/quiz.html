<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Time</title>
    <link rel="stylesheet" href="./quiz.css">
</head>

<body>
    <div class="control">
        <div class="control-inner">
            <h3>Pick vocab</h3> 

            <input id="fruitCheck" type="checkbox">
            <label for="fruitCheck">Fruit</label>

            <input id="vegCheck" type="checkbox">
            <label for="vegCheck">Vegatable</label>

            <input id="jobCheck" type="checkbox">
            <label for="jobCheck">Job</label>

            <input id="animalCheck" type="checkbox">
            <label for="animalCheck">Animal</label>
            

            <h3>How many questions</h3>
            <select name="qNumb" id="qNumb">
                <option value="10">10</option>
                <option value="20">20</option>
                <option value="30">30</option>
            </select>

            <h3>Question Type</h3>
            <select name="questType" id="questType">
                <option value="all">All</option>
                <option id="imgSound" value="imgSound">Image and Sound</option>
                <option value="imgText">Image and Text</option>
                <option id="textSound" value="textSound">Text and Sound</option>
            </select>

            <div>
                <button onclick="start()">Start</button>               
            </div>

        </div>
    </div>
    <div class="test">
        <h3>##/##</h3>
        <h2>Question text</h2>
        <div id="questCon"></div>
        <div id="testCon"></div>
        <div id="enterCon"><button><img id="entrBtn" src="../../resource/img/icon/enter.png" alt=""></button></div>
    </div>

    <script src="../../database/database.js"></script>
    <script src="./quiz.js"></script>
</body>

</html>
