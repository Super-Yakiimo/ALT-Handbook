<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Time</title>
    <link rel="stylesheet" href="./quiz.css">
    <link rel="icon" type="image/x-icon" href="../../resource/img/icon/favicon.ico">
</head>

<body>
    <div id="start" class="control">
        <div class="control-inner">
            <h1>Controls</h1>

            <h3>Pick vocab</h3>

            <div id="checkCon"></div>

            <h3>How many questions</h3>
            <select name="qNumb" id="qNumb">
                <option value="10">10</option>
                <option value="20">20</option>
                <option value="30">30</option>
            </select>

            <h3>Question Type</h3>
            <select name="questType" id="questType">
                <option value="all">All</option>
                <option id="imgSound" value="imgSound">Image and Sound</option>
                <option value="imgText">Image and Text</option>
                <option id="textSound" value="textSound">Text and Sound</option>
            </select>

            <br>
            <br>
            <br>

            <div>
                <button onclick="start()">Start</button>
            </div>

        </div>
    </div>

    <div id="end" class="control hide">
        <div class="control-inner">

            <h1>Finish</h1>

            <h2 id="finalScoreText">Score <span>##/##</span></h2>

            <button onclick="location.reload(true);">Play Again</button>

        </div>
    </div>

    <div class="test">
        <h3 id="scoreText">##/##</h3>
        <div id="questCon"></div>
        <div id="testCon"></div>
        <div id="enterCon"><button><img id="entrBtn" src="../../resource/img/icon/enter.png" alt=""></button></div>
    </div>

    <script src="../../database/database.js"></script>
    <script src="./quiz.js"></script>
</body>

</html>
